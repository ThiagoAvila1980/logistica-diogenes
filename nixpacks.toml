# Coolify/Nixpacks — app principal (Next.js).
#
# Trava o build/start de PRODUÇÃO. Sem este arquivo, o Coolify dependia do
# comando configurado no painel — que estava em `next dev` e servia o site sem
# CSS no mobile (o dev server troca os nomes dos chunks a cada recompile, então
# navegadores com a aba em cache pedem URLs de CSS/JS que já não existem -> 404).
#
# build:clean é só para uso local — no Coolify o cache Docker monta em
# .next/cache e o rmSync falha com EBUSY. Aqui usamos `next build` direto.
providers = ["node"]

# Coolify/Nixpacks define NODE_ENV=production — sem isso o npm omite
# devDependencies e o build quebra ao carregar @tailwindcss/postcss.
[phases.install]
cmds = ["npm install --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"

[variables]
NEXT_TELEMETRY_DISABLED = "1"
NODE_OPTIONS = "--max-old-space-size=4096"
NPM_CONFIG_PRODUCTION = "false"
