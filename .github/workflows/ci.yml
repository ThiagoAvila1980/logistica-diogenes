name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      # Lint ainda não habilitado no CI: `next lint` não está configurado
      # (abre prompt interativo). Configurar o ESLint flat config e então
      # adicionar o passo: `npm run lint`.
